# Test on Windows Desktop using Azure DevOps parallel jobs
parameters:
- name: testRunName
  type: string
  default: ''
- name: jobName
  type: string
  default: ''
- name: testArtifactName
  type: string
  default: ''
- name: configuration
  type: string
  default: 'Debug'
- name: testArguments
  type: string
  default: ''
- name: parallel
  type: number
  default: 4
- name: poolParameters
  type: object

jobs:
- job: ${{ parameters.jobName }}
  strategy:
    parallel: ${{ parameters.parallel }}
  pool: ${{ parameters.poolParameters }}
  timeoutInMinutes: 120
  variables:
    DOTNET_ROLL_FORWARD: LatestMajor
    DOTNET_ROLL_FORWARD_TO_PRERELEASE: 1
  steps:
    - checkout: none

    # .NET 10 is needed since our unit tests target net10.0
    - task: UseDotNet@2
      displayName: 'Install .NET 10 Runtime'
      inputs:
        packageType: sdk
        version: '10.0.x'
        installationPath: '$(Build.SourcesDirectory)/.dotnet'

    - task: DownloadPipelineArtifact@2
      displayName: Download Test Payload
      inputs:
        artifact: ${{ parameters.testArtifactName }}
        path: '$(Build.SourcesDirectory)'

    - task: BatchScript@1
      displayName: Rehydrate RunTests
      inputs:
        filename: artifacts/bin/RunTests/${{ parameters.configuration }}/net10.0/rehydrate.cmd
      env:
        HELIX_CORRELATION_PAYLOAD: '$(Build.SourcesDirectory)\.duplicate'

    - task: PowerShell@2
      displayName: Run Unit Tests
      inputs:
        filePath: eng/build.ps1
        arguments: -ci -configuration ${{ parameters.configuration }} ${{ parameters.testArguments }} -collectDumps
      env:
        HELIX_CORRELATION_PAYLOAD: '$(Build.SourcesDirectory)\.duplicate'
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - task: PublishTestResults@2
      displayName: Publish xUnit Test Results
      inputs:
        testRunner: XUnit
        testResultsFiles: '$(Build.SourcesDirectory)\artifacts\TestResults\${{ parameters.configuration }}\*.xml'
        mergeTestResults: true
        testRunTitle: '${{ parameters.testRunName }} Slice $(System.JobPositionInPhase) of $(System.TotalJobsInPhase)'
      condition: always()

    - template: publish-logs.yml
      parameters:
        configuration: ${{ parameters.configuration }}
        jobName: ${{ parameters.jobName }}
        artifactNameSuffix: ' Slice $(System.JobPositionInPhase)'