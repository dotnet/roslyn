# Roslyn VS integration test stage.

parameters:
- name: prNumber
  type: string
  default: 'None'
- name: sha
  type: string
  default: 'None'
- name: EnforceLatestCommit
  type: boolean
  default: true
- name: visualStudioBootstrapperURI
  type: string
  default: '(default)'
- name: testCaseFilter
  type: string
  default: ''
- name: skipCustomRoslynDeploy
  type: boolean
  default: true
- name: testsCommitHash
  type: string
  default: '(default)'
- name: testsCommitFromVisualStudioBuild
  type: boolean
  default: false
- name: testMachineCleanUpStrategy
  type: string
  default: delete
- name: testMachineRetention
  type: string
  default: 1:0:0:0
- name: roslynRepositoryAlias
  type: string
  default: self
- name: testStageFilter
  type: object
  default: ''

stages:
- template: /stages/visual-studio/agent.yml@DartLabTemplates
  parameters:
    name: RoslynVSIntegration
    displayName: Roslyn VS Integration
    testLabPoolName: VS-Platform
    testMachineCleanUpStrategy: ${{ parameters.testMachineCleanUpStrategy }}
    testMachineRetention: ${{ parameters.testMachineRetention }}
    templateContext:
      owner: mlinfraswat
      areaPath: DevDiv\NET Developer Experience\CSharp and VB IDE
      ${{ if ne(parameters.testStageFilter, '') }}:
        filter: ${{ parameters.testStageFilter }}
    visualStudioBootstrapperURI: ${{ iif(eq(parameters.visualStudioBootstrapperURI, '(default)'), 'https://vsdrop.corp.microsoft.com/file/v1/$(VisualStudio.BuildUnderTest.ProductsDropName);bootstrappers/Enterprise/vs_enterprise.exe', parameters.visualStudioBootstrapperURI) }}
    visualStudioInstallationParameters: --add Microsoft.VisualStudio.Component.NuGet --add Microsoft.VisualStudio.Component.Roslyn.Compiler --add Microsoft.Component.MSBuild --add Microsoft.NetCore.Component.Runtime.6.0 --add Microsoft.NetCore.Component.SDK --add Microsoft.Net.Component.4.7.2.TargetingPack --add Microsoft.VisualStudio.Component.Roslyn.LanguageServices --add Microsoft.VisualStudio.Component.FSharp --add Microsoft.ComponentGroup.ClickOnce.Publish --add Microsoft.NetCore.Component.DevelopmentTools --add Microsoft.VisualStudio.Component.MSODBC.SQL --add Microsoft.VisualStudio.Component.MSSQL.CMDLnUtils --add Microsoft.VisualStudio.Component.SQL.LocalDB.Runtime --add Microsoft.VisualStudio.Component.SQL.CLR --add Microsoft.VisualStudio.Component.CoreEditor --add Microsoft.VisualStudio.Workload.CoreEditor --add Microsoft.Net.Component.4.8.SDK --add Microsoft.Net.ComponentGroup.DevelopmentPrerequisites --add Microsoft.VisualStudio.Component.TypeScript.TSServer --add Microsoft.VisualStudio.ComponentGroup.WebToolsExtensions --add Microsoft.VisualStudio.Component.JavaScript.TypeScript --add Microsoft.VisualStudio.Component.JavaScript.Diagnostics --add Microsoft.VisualStudio.Component.TextTemplating --add Microsoft.VisualStudio.Component.IISExpress --add Microsoft.VisualStudio.Component.Common.Azure.Tools --add Microsoft.Component.ClickOnce --add Microsoft.VisualStudio.Component.ManagedDesktop.Core --add Microsoft.VisualStudio.Component.SQL.SSDT --add Microsoft.VisualStudio.Component.SQL.DataSources --add Component.Microsoft.Web.LibraryManager --add Component.Microsoft.WebTools.BrowserLink.WebLivePreview --add Microsoft.VisualStudio.ComponentGroup.Web --add Microsoft.VisualStudio.Component.FSharp.WebTemplates --add Microsoft.VisualStudio.Component.DockerTools --add Microsoft.NetCore.Component.Web --add Microsoft.VisualStudio.Component.WebDeploy --add Microsoft.VisualStudio.Component.AppInsights.Tools --add Microsoft.VisualStudio.Component.Web --add Microsoft.Net.Component.4.8.TargetingPack --add Microsoft.Net.ComponentGroup.4.8.DeveloperTools --add Microsoft.VisualStudio.Component.AspNet45 --add Microsoft.VisualStudio.Component.AspNet --add Component.Microsoft.VisualStudio.Web.AzureFunctions --add Microsoft.VisualStudio.ComponentGroup.AzureFunctions --add Microsoft.VisualStudio.Component.Debugger.Snapshot --add Microsoft.VisualStudio.ComponentGroup.Web.CloudTools --add Microsoft.VisualStudio.Component.IntelliTrace.FrontEnd --add Microsoft.VisualStudio.Component.DiagnosticTools --add Microsoft.VisualStudio.Component.EntityFramework --add Microsoft.VisualStudio.Component.LiveUnitTesting --add Microsoft.VisualStudio.Component.Debugger.JustInTime --add Component.Microsoft.VisualStudio.LiveShare.2022 --add Microsoft.VisualStudio.Component.WslDebugging --add Microsoft.VisualStudio.Component.IntelliCode --add Microsoft.VisualStudio.Workload.NetWeb --add Microsoft.VisualStudio.Component.ManagedDesktop.Prerequisites --add Microsoft.ComponentGroup.Blend --add Microsoft.VisualStudio.Component.DotNetModelBuilder --add Microsoft.VisualStudio.Component.FSharp.Desktop --add Microsoft.VisualStudio.Component.PortableLibrary --add Microsoft.VisualStudio.Workload.ManagedDesktop --add Microsoft.Net.Component.4.6.TargetingPack --add Microsoft.VisualStudio.Component.VSSDK --add Microsoft.VisualStudio.ComponentGroup.VisualStudioExtension.Prerequisites --add Microsoft.Component.CodeAnalysis.SDK --add Microsoft.VisualStudio.Workload.VisualStudioExtension --installPath "C:\Test\VisualStudio" --quiet --norestart --wait
    testExecutionJobStrategy:
      maxParallel: 4
      matrix:
        debug_32:
          _configuration: Debug
          _oop64bit: false
        debug_64:
          _configuration: Debug
          _oop64bit: true
        release_32:
          _configuration: Release
          _oop64bit: false
        release_64:
          _configuration: Release
          _oop64bit: true
    testExecutionJobVariables:
    - name: XUNIT_LOGS
      value: $(Build.SourcesDirectory)\artifacts\log\$(_configuration)
    testMachineTotalCount: 4
    testAgentElevated: true
    preTestMachineConfigurationStepList:
    - checkout: none
    - task: DownloadBuildArtifacts@1
      displayName: Download Visual Studio build artifacts
      inputs:
        buildType: specific
        project: $(resources.pipeline.VisualStudioBuildUnderTest.projectID)
        definition: $(resources.pipeline.VisualStudioBuildUnderTest.pipelineID)
        buildVersionToDownload: specific
        buildId: $(resources.pipeline.VisualStudioBuildUnderTest.runID)
        downloadType: specific
        artifactName: BuildArtifacts
        downloadPath: $(Pipeline.Workspace)\VisualStudioBuildUnderTest
    - task: PowerShell@2
      name: SetProductsDropName
      displayName: Set 'VisualStudio.BuildUnderTest.ProductsDropName'
      inputs:
        filePath: $(DartLab.Path)\Scripts\VisualStudio\Build\Get-VisualStudioDropName.ps1
        arguments: -DropNamePrefix 'Products' -VstsDropUrlsJson '$(Pipeline.Workspace)\VisualStudioBuildUnderTest\BuildArtifacts\VstsDropUrls.json' -OutVariableName 'VisualStudio.BuildUnderTest.ProductsDropName'
    deployAndRunTestsStepList:
    - checkout: RoslynMirror
      fetchDepth: 1
      fetchTags: false
      persistCredentials: true
    - ${{ if ne(parameters.prNumber, 'None') }}:
      - task: PowerShell@2
        displayName: Setup branch for validation
        inputs:
          filePath: 'eng\setup-pr-validation.ps1'
          arguments: "-sourceBranchName $(Build.SourceBranch) -prNumber ${{ parameters.prNumber }} -commitSHA ${{ parameters.sha }} -enforceLatestCommit ${{ iif(parameters.EnforceLatestCommit, '1', '0') }}"
        condition: succeeded()
    - powershell: |
        git fetch origin ${{ parameters.testsCommitHash }}
        git checkout FETCH_HEAD
      condition: and(succeeded(), ${{ not(eq(parameters.testsCommitHash, '(default)')) }})
      displayName: 'Checkout tests at given commit'
    - powershell: |
        $globalJsonPath = Join-Path (Get-Location) 'global.json'
        $globalJsonBackupPath = "$globalJsonPath.roslyn-test-gate-$([Guid]::NewGuid())"

        if (Test-Path -LiteralPath $globalJsonPath) {
          Move-Item -LiteralPath $globalJsonPath -Destination $globalJsonBackupPath
        }

        try {
          $roslynCommitHash = dotnet .\eng\isolated\get-roslyn-commit-hash-in-vs.cs
          $dotnetExitCode = $LASTEXITCODE
        }
        finally {
          if (Test-Path -LiteralPath $globalJsonBackupPath) {
            Move-Item -LiteralPath $globalJsonBackupPath -Destination $globalJsonPath
          }
        }

        if ($dotnetExitCode -ne 0) {
          exit $dotnetExitCode
        }

        Write-Host "Checking out tests at commit from Visual Studio build: $roslynCommitHash"
        git fetch origin $roslynCommitHash
        git checkout FETCH_HEAD
      condition: and(succeeded(), ${{ eq(parameters.testsCommitFromVisualStudioBuild, true) }})
      displayName: 'Checkout tests at commit from Visual Studio build'
    - template: /eng/pipelines/test-integration-job.yml@${{parameters.roslynRepositoryAlias}}
      parameters:
        configuration: $(_configuration)
        oop64bit: $(_oop64bit)
        lspEditor: false
        skipCheckout: true
        testCaseFilter: ${{ parameters.testCaseFilter }}
        skipCustomRoslynDeploy: ${{ parameters.skipCustomRoslynDeploy }}
