parameters:
- name: configuration
  type: string
  default: 'Debug'

steps:
  - task: Cache@2
    displayName: Cache Roslyn Outputs
    inputs:
      key: '"roslyn" | "$(Agent.OS)" | "${{ parameters.configuration }}" | "$(Build.SourceBranch)" | "$(Build.BuildId)"'
      restoreKeys: |
        "roslyn" | "$(Agent.OS)" | "${{ parameters.configuration }}" | "$(Build.SourceBranch)"
        "roslyn" | "$(Agent.OS)" | "${{ parameters.configuration }}" | "$(System.PullRequest.TargetBranch)"
        "roslyn" | "$(Agent.OS)" | "${{ parameters.configuration }}"
        "roslyn" | "$(Agent.OS)"
        "roslyn"
      path: $(ROSLYN_CACHE_PATH)

  - task: PowerShell@2
    displayName: Record Roslyn Cache Build Start Time
    inputs:
      targetType: 'inline'
      script: |
        $buildStart = [System.DateTimeOffset]::UtcNow.ToString("O", [System.Globalization.CultureInfo]::InvariantCulture)
        Write-Host "Roslyn compiler cache build start time: $buildStart"
        Write-Host "##vso[task.setvariable variable=RoslynCompilerCacheBuildStartTime]$buildStart"
