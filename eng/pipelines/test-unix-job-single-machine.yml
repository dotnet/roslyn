# Test on Unix using a single machine
parameters:
- name: testRunName
  type: string
  default: ''
- name: jobName
  type: string
  default: ''
- name: testArtifactName
  type: string
  default: ''
- name: configuration
  type: string
  default: 'Debug'
- name: testArguments
  type: string
  default: ''
- name: poolParameters
  type: object
- name: locale
  type: string
  default: ''

jobs:
- job: ${{ parameters.jobName }}
  pool: ${{ parameters.poolParameters }}
  timeoutInMinutes: 120
  variables:
    DOTNET_ROLL_FORWARD: LatestMajor
    DOTNET_ROLL_FORWARD_TO_PRERELEASE: 1
    ${{ if ne(parameters.locale, '') }}:
      LC_ALL: ${{ parameters.locale }}
  steps:
    - checkout: none

    - script: sudo locale-gen ${{ parameters.locale }}
      displayName: Generate Locale
      condition: ne('${{ parameters.locale }}', '')

    - task: DownloadPipelineArtifact@2
      displayName: Download Test Payload
      inputs:
        artifact: ${{ parameters.testArtifactName }}
        path: '$(Build.SourcesDirectory)'

    - task: UseDotNet@2
      displayName: Install .NET (from global.json)
      inputs:
        useGlobalJson: true
        workingDirectory: '$(Build.SourcesDirectory)'

    - task: ShellScript@2
      displayName: Rehydrate Unit Tests Environment
      inputs:
        scriptPath: ./rehydrate-all.sh

    - task: CmdLine@2
      inputs:
        script: dotnet exec "$(Build.SourcesDirectory)/artifacts/bin/RunTests/${{ parameters.configuration }}/net10.0/RunTests.dll" --ci --testConfiguration ${{ parameters.configuration }} --logs "$(Build.SourcesDirectory)/artifacts/log/${{ parameters.configuration }}" ${{ parameters.testArguments }}
      displayName: Test

    - template: publish-logs.yml
      parameters:
        configuration: ${{ parameters.configuration }}
        jobName: ${{ parameters.jobName }}
        testRunName: ${{ parameters.testRunName }}
