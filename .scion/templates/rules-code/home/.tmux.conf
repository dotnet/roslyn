# --- Color & Terminal Settings ---

# Set the default terminal mode to 256 colors
set -g default-terminal "xterm-256color"


# --- General Quality of Life ---

# Increase scrollback buffer size
set -g history-limit 10000

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Allow extended keys (CSI u / Kitty keyboard protocol):
# "always" forces tmux to forward CSI u sequences to inner applications
# regardless of whether they have opted in via the progressive enhancement
# query.  This is needed because tools like claude-code don't explicitly
# request extended keys but do understand CSI u for Shift+Enter etc.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Mouse support is on by default for native terminal use (pane resizing,
# scrollback scrolling, etc.). In the web terminal, xterm.js can still do
# browser-native text selection with a modifier key while mouse stays on:
# hold Shift while dragging, or Option on macOS. The
# explicit toggle (C-b m / C-b M or the web toolbar button) remains as a
# fallback when plain drag selection is preferred.
set -g mouse on
# Explicit mouse on/off (used by web toolbar to avoid state drift)
bind m set -g mouse off \; display "Mouse: OFF"
bind M set -g mouse on \; display "Mouse: ON"

# --- Web Toolbar Window Switching ---
# These bindings are used by the web terminal toolbar to switch between
# the agent and shell tmux windows via prefix key sequences.
bind A select-window -t scion:agent
bind S if-shell "tmux select-window -t scion:shell 2>/dev/null" "" "new-window -t scion -n shell"

# --- Visual Styling (Example 256 Color Theme) ---

# Status bar colors
set -g status-style bg=colour235,fg=colour136

# Status bar content
set -g status-left "[scion] "
set -g status-right-length 100
set -g status-right "#[fg=colour244]#(echo $SCION_TEMPLATE_NAME) #[fg=colour136]/ #[fg=colour166]#(echo $SCION_AGENT_NAME) #[fg=colour136](#(echo $SCION_BROKER_NAME)) #[fg=colour136]%H:%M %d-%b-%y"

# Allow programs to bypass tmux and talk directly to the terminal (required for banners/images)
set -g allow-passthrough on

# Inform tmux that the outside terminal supports RGB/TrueColor
# set -a terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm*:RGB"

# Window title colors
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# Pane border colors
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240

# Message text
set -g message-style bg=colour235,fg=colour166

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# set clipboard relay
set -s set-clipboard on

# Disable tmux's own drag-selection bindings so the tmux selection highlight
# never appears. In the web terminal, xterm.js handles selection and clipboard;
# the tmux orange highlight is confusing because it does not copy to clipboard.
# Unbind in root (prevents entering copy-mode via drag) and in copy-mode
# (prevents selection highlight when drag starts after scrolling into copy-mode).
unbind -T root MouseDrag1Pane
unbind -T copy-mode MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Agent Exit Detection ---
# When the agent window's command exits, the pane closes and the window is
# destroyed. This hook detects that the "agent" window is gone and kills the
# session, which causes sciontool init to proceed with its shutdown sequence.
# Closing the shell window does NOT trigger this — only the agent window.
set-hook -g pane-exited "if-shell '! tmux list-windows -t scion -F \"##{window_name}\" 2>/dev/null | grep -q \"^agent$\"' 'kill-session -t scion'"
